steps:
  # Write .env.production so NEXT_PUBLIC_* vars are baked into the Next.js bundle at build time
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cat > apps/web/.env.production <<EOF
        NEXT_PUBLIC_FIREBASE_API_KEY=$$NEXT_PUBLIC_FIREBASE_API_KEY
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        NEXT_PUBLIC_FIREBASE_PROJECT_ID=$$NEXT_PUBLIC_FIREBASE_PROJECT_ID
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$$NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$$NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        NEXT_PUBLIC_FIREBASE_APP_ID=$$NEXT_PUBLIC_FIREBASE_APP_ID
        NEXT_PUBLIC_APP_URL=https://app.smartcommission.app
        EOF
    secretEnv:
      - NEXT_PUBLIC_FIREBASE_API_KEY
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
      - NEXT_PUBLIC_FIREBASE_APP_ID

  # Build the Docker image (NEXT_PUBLIC_* baked in via .env.production above)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/smartcommission/web:$COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/smartcommission/web:latest'
      - '.'
    dir: 'apps/web'

  # Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/smartcommission/web'

  # Run Prisma migrations via Cloud SQL Auth Proxy
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        wget -qO /cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
        chmod +x /cloud-sql-proxy
        /cloud-sql-proxy --unix-socket /cloudsql $_INSTANCE_CONNECTION_NAME &
        sleep 3
        docker run --rm \
          --network host \
          -v /cloudsql:/cloudsql \
          -e DATABASE_URL="$$DATABASE_DIRECT_URL" \
          $_REGION-docker.pkg.dev/$PROJECT_ID/smartcommission/web:$COMMIT_SHA \
          sh -c 'npx prisma migrate deploy'
    secretEnv: ['DATABASE_DIRECT_URL']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - smartcommission-web
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/smartcommission/web:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=$_INSTANCE_CONNECTION_NAME'
      - '--service-account=smartcommission-app@$PROJECT_ID.iam.gserviceaccount.com'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--cpu-boost'
      - '--concurrency=80'
      - '--timeout=300'
      - '--set-env-vars=OIDC_ISSUER=https://app.smartcommission.app'
      - >-
        --set-secrets=DATABASE_URL=smartcommission-db-url:latest,SESSION_SECRET=smartcommission-session-secret:latest,ENCRYPTION_KEY=smartcommission-encryption-key:latest,CLEANUP_SECRET=smartcommission-cleanup-secret:latest,FIREBASE_PROJECT_ID=smartcommission-firebase-project-id:latest,FIREBASE_CLIENT_EMAIL=smartcommission-firebase-client-email:latest,FIREBASE_PRIVATE_KEY=smartcommission-firebase-private-key:latest,GEMINI_API_KEY=smartcommission-gemini-key:latest,STRIPE_SECRET_KEY=smartcommission-stripe-secret:latest,STRIPE_WEBHOOK_SECRET=smartcommission-stripe-webhook:latest,OXR_API_KEY=smartcommission-oxr-key:latest,RESEND_API_KEY=smartcommission-resend-key:latest,OIDC_PRIVATE_KEY_PEM=smartcommission-oidc-private-key:latest,OIDC_PUBLIC_KEY_PEM=smartcommission-oidc-public-key:latest

availableSecrets:
  secretManager:
    - versionName: 'projects/$PROJECT_ID/secrets/smartcommission-db-direct-url/versions/latest'
      env: 'DATABASE_DIRECT_URL'
    - versionName: 'projects/$PROJECT_ID/secrets/smartcommission-firebase-api-key/versions/latest'
      env: 'NEXT_PUBLIC_FIREBASE_API_KEY'
    - versionName: 'projects/$PROJECT_ID/secrets/smartcommission-firebase-auth-domain/versions/latest'
      env: 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN'
    - versionName: 'projects/$PROJECT_ID/secrets/smartcommission-firebase-project-id/versions/latest'
      env: 'NEXT_PUBLIC_FIREBASE_PROJECT_ID'
    - versionName: 'projects/$PROJECT_ID/secrets/smartcommission-firebase-storage-bucket/versions/latest'
      env: 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET'
    - versionName: 'projects/$PROJECT_ID/secrets/smartcommission-firebase-messaging-sender-id/versions/latest'
      env: 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID'
    - versionName: 'projects/$PROJECT_ID/secrets/smartcommission-firebase-app-id/versions/latest'
      env: 'NEXT_PUBLIC_FIREBASE_APP_ID'

substitutions:
  _REGION: 'australia-southeast1'
  _INSTANCE_CONNECTION_NAME: 'prakash-shared:australia-southeast2:shared-db'

serviceAccount: 'projects/smartcommission-prod/serviceAccounts/1028287218164@cloudbuild.gserviceaccount.com'

options:
  logging: CLOUD_LOGGING_ONLY
